<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFlow | Hospital Appointments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="appointment-card">
        <div class="header">
            <h1>CareFlow</h1>
            <p>Book your medical consultation in seconds.</p>
        </div>

        <form id="appointmentForm">
            <div class="input-group">
                <label for="userName">Full Name</label>
                <input type="text" id="userName" placeholder="e.g. Alex Smith" required>
            </div>

            <div class="input-group">
                <label for="userPhone">Phone Number</label>
                <input type="tel" id="userPhone" placeholder="123-456-7890" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="appDate">Date</label>
                    <input type="date" id="appDate" required>
                </div>
                <div class="input-group">
                    <label for="appTime">Time</label>
                    <input type="time" id="appTime" required>
                </div>
            </div>

            <button type="submit" id="submitBtn">Confirm Appointment</button>
        </form>

        <div id="successMessage" class="hidden">
            <div class="check-icon">✓</div>
            <h3>Appointment Sent!</h3>
            <p>We will contact you shortly to confirm.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
