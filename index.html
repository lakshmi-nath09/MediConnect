<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect | Smart Healthcare Booking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="appointment-card">
            <div class="header">
                <div class="logo">
                    <i class="fa-solid fa-house-chimney-medical"></i>
                </div>
                <h1>MediConnect</h1>
                <p>Advanced Health Management System</p>
            </div>

            <form id="appointmentForm">
                <div class="input-group">
                    <label for="userName">Full Name</label>
                    <input type="text" name="Name" id="userName" placeholder="Enter patient's full name" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="country-code" name="CountryCode" style="width: 100px; border-radius: 8px; border: 1px solid #ddd; background: #fff;">
                            <option value="+91" selected>🇮🇳 +91</option>
                            <option value="+1">🇺🇸 +1</option>
                            <option value="+44">🇬🇧 +44</option>
                            <option value="+971">🇦🇪 +971</option>
                        </select>
                        <input type="tel" id="phone" name="Phone" 
                               placeholder="10-digit number" 
                               maxlength="10" 
                               style="flex: 1;"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
                               required>
                    </div>
                </div>

                <div class="input-group">
                    <button type="button" id="find-location-btn" class="btn-secondary">
                        <i class="fa-solid fa-location-crosshairs"></i> Find Hospitals Near Me
                    </button>
                    <p id="location-status" style="font-size: 0.8rem; color: #64748b; text-align: center; margin-top: 5px; min-height: 1.2rem;"></p>
                </div>

                <div class="input-group">
                    <label for="dept">Medical Department</label>
                    <select name="Department" id="dept" required>
                        <option value="" disabled selected>Select a department</option>
                        
                        <optgroup label="Primary Care">
                            <option value="General Medicine">🩺 General Medicine</option>
                            <option value="Pediatrics">👶 Pediatrics (Child Care)</option>
                            <option value="Emergency">🚨 Emergency Room</option>
                        </optgroup>

                        <optgroup label="Specialized Care">
                            <option value="Cardiology">❤️ Cardiology (Heart)</option>
                            <option value="Neurology">🧠 Neurology (Brain/Nerves)</option>
                            <option value="Orthopedics">🦴 Orthopedics (Bones)</option>
                            <option value="Dermatology">✨ Dermatology (Skin)</option>
                        </optgroup>

                        <optgroup label="Diagnostics & Therapy">
                            <option value="Radiology">🩻 Radiology (X-Ray/MRI)</option>
                            <option value="Pathology">🧪 Pathology (Lab Tests)</option>
                            <option value="Physiotherapy">🏃 Physiotherapy</option>
                        </optgroup>
                    </select>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="appDate">Appointment Date</label>
                        <input type="date" name="Date" id="appDate" required>
                    </div>
                    <div class="input-group">
                        <label for="appTime">Preferred Time</label>
                        <input type="time" name="Time" id="appTime" required>
                    </div>
                </div>

                <div class="input-group checkbox-row">
                    <input type="checkbox" id="privacy" required>
                    <label for="privacy" style="font-size: 0.85rem;">I agree to the privacy policy and data processing.</label>
                </div>

                <button type="submit" id="submitBtn">Confirm Appointment</button>
            </form>

            <div id="successMessage" class="hidden">
                <div class="success-icon">
                    <i class="fa-solid fa-circle-check" style="color: #22c55e; font-size: 3rem;"></i>
                </div>
                <h3>Appointment Confirmed!</h3>
                
                <div class="appointment-id-box" id="printableArea">
                    <p style="margin-bottom: 5px; color: #64748b; font-size: 0.8rem;">OFFICIAL RECEIPT</p>
                    <h2 id="displayID" style="color: #1e293b; letter-spacing: 2px;">#CF-0000</h2>
                    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #e2e8f0;">
                    <p id="receiptName" style="font-weight: 600; color: #2563eb;"></p>
                    <p id="receiptDateTime" style="font-size: 0.9rem; color: #475569;"></p>
                    <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 10px;">MediConnect Digital Health Record</p>
                </div>

                <div class="action-buttons">
                    <button onclick="window.print()" class="btn-print">
                        <i class="fa-solid fa-print"></i> Print Receipt
                    </button>
                    <button onclick="location.reload()" class="btn-secondary">Book Another</button>
                </div>
            </div>
        </div>

        <footer class="hospital-footer">
            <p>© 2026 MediConnect Healthcare Systems | Secure Patient Portal</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
